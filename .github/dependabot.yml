version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    # Group framework + tooling bumps so we don't drown in PRs.
    groups:
      next-react:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@types/react*"
      clerk:
        patterns:
          - "@clerk/*"
      drizzle:
        patterns:
          - "drizzle-orm"
          - "drizzle-kit"
          - "@neondatabase/*"
      aws:
        patterns:
          - "@aws-sdk/*"
      tooling:
        patterns:
          - "@biomejs/*"
          - "typescript"
          - "@types/node"
          - "tailwindcss"
          - "@tailwindcss/*"
          - "postcss"

  - package-ecosystem: "npm"
    directory: "/packages/petdex-cli"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "cli"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"
